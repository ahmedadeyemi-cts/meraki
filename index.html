<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>US Signal | Meraki Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<style>
:root{
--bg:#081a2f;
--panel:#102844;
--line:rgba(255,255,255,.12);
--text:#e8f1fb;
--muted:#9db3ca;
--accent:#00a3e0;
--success:#2fcf84;
--warning:#f3b64a;
--danger:#f06a6a;
}

body{margin:0;font-family:Segoe UI;background:var(--bg);color:var(--text)}
.app{display:grid;grid-template-columns:260px 1fr;height:100vh}

/* SIDEBAR */
.sidebar{background:#061222;padding:20px}
.sidebar img{width:100%;margin-bottom:20px}
.nav-btn{display:block;width:100%;padding:10px;color:#9db3ca;background:none;border:none;text-align:left;cursor:pointer}
.nav-btn:hover,.nav-btn.active{background:#12345c}

/* HEADER */
.global-header{
position:sticky;top:0;z-index:10;
background:#081a2f;border-bottom:1px solid var(--line);
display:flex;justify-content:space-between;padding:10px
}

.global-header input{
padding:8px;border-radius:8px;border:1px solid var(--line);
background:#091b2f;color:white
}

/* MAIN */
.main{padding:20px;overflow:auto}
.card{background:var(--panel);padding:16px;border-radius:10px;margin-bottom:16px}
.grid{display:grid;gap:12px}
.kpi{grid-template-columns:repeat(4,1fr)}

.kpi .value{font-size:28px;font-weight:800}

/* TABLE */
table{width:100%;border-collapse:collapse}
td,th{padding:8px;border-bottom:1px solid var(--line)}
th{color:#9db3ca}

/* RAG */
.rag-green{background:#1f7a4d;padding:6px 10px;border-radius:999px}
.rag-yellow{background:#7a5d1f;padding:6px 10px;border-radius:999px}
.rag-red{background:#7a1f1f;padding:6px 10px;border-radius:999px}

/* MODAL */
.modal{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center
}
.modal-content{background:#0d2745;padding:20px;border-radius:10px;width:600px;max-height:80%;overflow:auto}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
<img src="https://oncall.onenecklab.com/ussignal.jpg"/>

<button class="nav-btn active" data-route="dashboard">Dashboard</button>
<button class="nav-btn" data-route="customers">Customers</button>
<button class="nav-btn" data-route="reports">Reports</button>
<button class="nav-btn" data-route="snmp">SNMP</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- HEADER -->
<div class="global-header">
<div>
<input id="search" placeholder="Search logs, customers..."/>
</div>

<div>
<select id="customerSwitcher"></select>
<span id="rag" class="rag-red">Critical</span>
<button onclick="runNow()">Run</button>
</div>
</div>

<!-- CRON -->
<div id="cronBanner" class="card"></div>

<!-- KPI -->
<div class="grid kpi">
<div class="card"><div>Calls</div><div id="kpiCalls" class="value">0</div></div>
<div class="card"><div>Success</div><div id="kpiSuccess" class="value">0%</div></div>
<div class="card"><div>Stage</div><div id="kpiStage">-</div></div>
<div class="card"><div>Write</div><div id="kpiWrite">0</div></div>
</div>

<!-- TABLE -->
<div class="card">
<h3>Recent Calls</h3>
<div id="table"></div>
</div>

</div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content" id="modalContent"></div>
</div>

<script>
const API="";

let state={customers:[],calls:[],weekly:{}};

init();

async function init(){
await loadCustomers();
await refresh();
setInterval(refresh,60000);
}

/* API */
async function api(path){
const r=await fetch(API+path);
return await r.json();
}

/* LOAD */
async function loadCustomers(){
const d=await api("/api/customers");
state.customers=d.items||[];

const sel=document.getElementById("customerSwitcher");
sel.innerHTML="<option value=''>All</option>";

state.customers.forEach(c=>{
sel.add(new Option(c.name,c.customerId));
});

sel.onchange=refresh;
}

/* DASHBOARD */
async function refresh(){
const cid=document.getElementById("customerSwitcher").value;

state.weekly=await api("/api/weekly?customerId="+cid);
state.calls=(await api("/api/reports/calls")).items||[];

render();
await loadCron();
}

/* RENDER */
function render(){
const w=state.weekly;

document.getElementById("kpiCalls").innerText=w.totalCalls||0;
document.getElementById("kpiSuccess").innerText=(w.successRate||0)+"%";
document.getElementById("kpiStage").innerText=w.stage||"-";

const write=(w.methods?.POST||0)+(w.methods?.PUT||0)+(w.methods?.DELETE||0);
document.getElementById("kpiWrite").innerText=write;

updateRAG();
renderTable();
}

/* RAG */
function updateRAG(){
const w=state.weekly;
let el=document.getElementById("rag");

if(w.totalCalls>=7500 && w.successRate>=95){
el.className="rag-green";el.innerText="Healthy";
}else if(w.totalCalls>=5000){
el.className="rag-yellow";el.innerText="At Risk";
}else{
el.className="rag-red";el.innerText="Critical";
}
}

/* TABLE */
function renderTable(){
let rows=state.calls.slice(0,50).map(c=>`
<tr onclick="openModal('${c.timestamp}')">
<td>${c.timestamp}</td>
<td>${c.customerId}</td>
<td>${c.method}</td>
<td>${c.path}</td>
<td>${c.status}</td>
</tr>`).join("");

document.getElementById("table").innerHTML=`
<table>
<tr><th>Time</th><th>Customer</th><th>Method</th><th>Path</th><th>Status</th></tr>
${rows}
</table>`;
}

/* MODAL */
function openModal(ts){
const call=state.calls.find(c=>c.timestamp===ts);
document.getElementById("modalContent").innerText=JSON.stringify(call,null,2);
document.getElementById("modal").style.display="flex";
}

document.getElementById("modal").onclick=()=>document.getElementById("modal").style.display="none";

/* CRON */
async function loadCron(){
const d=await api("/api/cron/status");
if(!d.lastRun){
document.getElementById("cronBanner").innerText="No cron run yet";
return;
}
document.getElementById("cronBanner").innerText=
"Last Run: "+d.lastRun.ts+" | Calls: "+d.lastRun.result.totalCalls;
}

/* ACTIONS */
async function runNow(){
const r=await api("/api/run");
alert(JSON.stringify(r,null,2));
refresh();
}

/* SEARCH */
document.getElementById("search").oninput=(e)=>{
const q=e.target.value.toLowerCase();
state.calls=state.calls.filter(c=>JSON.stringify(c).toLowerCase().includes(q));
renderTable();
};

/* ROUTING */
document.querySelectorAll(".nav-btn").forEach(b=>{
b.onclick=()=>{
history.pushState({}, "", "/"+b.dataset.route);
document.querySelectorAll(".nav-btn").forEach(x=>x.classList.remove("active"));
b.classList.add("active");
};
});
</script>

</body>
</html>
